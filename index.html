<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Building Emissions Benchmark & Decarbonisation Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #071510; font-family: 'DM Mono', monospace; color: #e2f5ec; }
  select, input { appearance: none; -webkit-appearance: none; }
  select option { background: #071510; }
  input::placeholder { color: #2d5a45; }
  select:focus, input:focus { border-color: #22c55e !important; outline: none; }
  .fade-in { animation: fadeUp 0.4s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #071510; }
  ::-webkit-scrollbar-thumb { background: #1a3d30; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect } = React;
const { AreaChart, Area, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine, ResponsiveContainer } = Recharts;

const EMISSION_FACTORS = {
  Denmark: 0.154, Sweden: 0.045, Norway: 0.026, Finland: 0.098,
  Germany: 0.385, Netherlands: 0.283, France: 0.052, Italy: 0.233,
  Spain: 0.181, Poland: 0.635, "United Kingdom": 0.225, Belgium: 0.167,
  Lithuania: 0.216, Latvia: 0.119, Estonia: 0.471, "Czech Republic": 0.421,
  Austria: 0.104, Switzerland: 0.030, Portugal: 0.196, Greece: 0.328,
};

const EU_BENCHMARKS = {
  Office: { avg: 45, good: 28, poor: 70 },
  Residential: { avg: 35, good: 20, poor: 55 },
  Retail: { avg: 55, good: 35, poor: 85 },
  Industrial: { avg: 80, good: 50, poor: 120 },
  Hotel: { avg: 65, good: 40, poor: 100 },
  Healthcare: { avg: 90, good: 60, poor: 130 },
};

const CSRD_CHECKS = [
  { id: "scope1", label: "Scope 1 emissions tracked", weight: 20 },
  { id: "scope2", label: "Scope 2 emissions tracked", weight: 20 },
  { id: "scope3", label: "Scope 3 partial coverage", weight: 15 },
  { id: "energyAudit", label: "Energy audit conducted", weight: 15 },
  { id: "sbti", label: "SBTi target set", weight: 15 },
  { id: "thirdParty", label: "Third-party verified data", weight: 15 },
];

function getRating(value, benchmark) {
  if (value <= benchmark.good) return { label: "Excellent", color: "#22c55e" };
  if (value <= benchmark.avg) return { label: "Good", color: "#84cc16" };
  if (value <= benchmark.poor) return { label: "Average", color: "#f59e0b" };
  return { label: "Poor", color: "#ef4444" };
}

function buildDecarbPath(currentIntensity) {
  const startYear = 2025;
  const targetYear = 2050;
  const years = [];
  for (let y = startYear; y <= targetYear; y++) {
    const progress = (y - startYear) / (targetYear - startYear);
    const eased = 1 - Math.pow(1 - progress, 2);
    years.push({
      year: y,
      emissions: parseFloat((currentIntensity * (1 - eased)).toFixed(2)),
      target: parseFloat((currentIntensity * (1 - progress)).toFixed(2)),
    });
  }
  return years;
}

const CustomTooltip = ({ active, payload, label }) => {
  if (active && payload && payload.length) {
    return (
      <div style={{ background: "#0f1f1a", border: "1px solid #1a3d30", borderRadius: 8, padding: "10px 14px" }}>
        <p style={{ color: "#86efac", fontWeight: 700, marginBottom: 4 }}>{label}</p>
        {payload.map((p, i) => (
          <p key={i} style={{ color: p.color, fontSize: 13 }}>{p.name}: {p.value} kg CO₂/m²</p>
        ))}
      </div>
    );
  }
  return null;
};

function App() {
  const [step, setStep] = useState(1);
  const [animIn, setAnimIn] = useState(true);
  const [form, setForm] = useState({
    country: "Denmark", buildingType: "Office", area: "", gasKwh: "", elecKwh: "", districtKwh: "",
  });
  const [csrd, setCsrd] = useState({});
  const [results, setResults] = useState(null);

  const goStep = (s) => { setAnimIn(false); setTimeout(() => { setStep(s); setAnimIn(true); }, 100); };

  const inp = (field, value) => setForm(p => ({ ...p, [field]: value }));

  function calculate() {
    const area = parseFloat(form.area) || 1;
    const gas = parseFloat(form.gasKwh) || 0;
    const elec = parseFloat(form.elecKwh) || 0;
    const district = parseFloat(form.districtKwh) || 0;
    const ef = EMISSION_FACTORS[form.country];
    const scope1 = gas * 0.202;
    const scope2 = elec * ef + district * 0.17;
    const total = scope1 + scope2;
    const intensity = total / area;
    const benchmark = EU_BENCHMARKS[form.buildingType];
    const rating = getRating(intensity, benchmark);
    const csrdScore = CSRD_CHECKS.reduce((acc, c) => acc + (csrd[c.id] ? c.weight : 0), 0);
    const path = buildDecarbPath(intensity);
    setResults({ scope1, scope2, total, intensity, benchmark, rating, csrdScore, path });
    goStep(4);
  }

  const card = { background: "#0d1f18", border: "1px solid #1a3d30", borderRadius: 16, padding: 32 };
  const label = { fontSize: 11, color: "#4ade80", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 8, display: "block" };
  const selectStyle = { width: "100%", background: "#071510", border: "1px solid #1a3d30", borderRadius: 8, color: "#e2f5ec", padding: "12px 14px", fontSize: 14, fontFamily: "'DM Mono', monospace", cursor: "pointer" };
  const inputStyle = { width: "100%", background: "#071510", border: "1px solid #1a3d30", borderRadius: 8, color: "#e2f5ec", padding: "12px 14px", fontSize: 14, fontFamily: "'DM Mono', monospace" };
  const btn = { background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#071510", border: "none", borderRadius: 10, padding: "14px 32px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Mono', monospace" };
  const btnOut = { background: "transparent", color: "#4ade80", border: "1px solid #1a3d30", borderRadius: 10, padding: "12px 24px", fontSize: 13, cursor: "pointer", fontFamily: "'DM Mono', monospace" };

  const stepLabels = ["Building Info", "Energy Data", "CSRD Check", "Results"];

  return (
    <div style={{ minHeight: "100vh", paddingBottom: 60 }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0a2218, #071510)", borderBottom: "1px solid #1a3d30", padding: "24px 40px", display: "flex", alignItems: "center", gap: 16 }}>
        <div style={{ width: 36, height: 36, background: "linear-gradient(135deg, #22c55e, #16a34a)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>🌿</div>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Syne', sans-serif", color: "#fff", letterSpacing: "-0.5px" }}>BuildingCarbon.io</div>
          <div style={{ fontSize: 11, color: "#4ade80", letterSpacing: "2px", textTransform: "uppercase" }}>Emissions Benchmark & Decarbonisation Tool</div>
        </div>
        <div style={{ marginLeft: "auto", fontSize: 11, color: "#2d5a45", letterSpacing: "1px" }}>POWERED BY GHG PROTOCOL</div>
      </div>

      {/* Steps */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", padding: "24px 40px", maxWidth: 800, margin: "0 auto" }}>
        {stepLabels.map((l, i) => (
          <React.Fragment key={i}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, background: step > i + 1 ? "#22c55e" : step === i + 1 ? "#071510" : "#0d1f18", border: step === i + 1 ? "2px solid #22c55e" : step > i + 1 ? "2px solid #22c55e" : "1px solid #1a3d30", color: step > i + 1 ? "#071510" : step === i + 1 ? "#22c55e" : "#4a7a62" }}>
                {step > i + 1 ? "✓" : i + 1}
              </div>
              <span style={{ fontSize: 10, color: step === i + 1 ? "#4ade80" : "#2d5a45", letterSpacing: "1px" }}>{l.toUpperCase()}</span>
            </div>
            {i < 3 && <div style={{ flex: 1, height: 1, background: "#1a3d30" }} />}
          </React.Fragment>
        ))}
      </div>

      {/* Content */}
      <div style={{ maxWidth: 760, margin: "0 auto", padding: "0 24px" }} className={animIn ? "fade-in" : ""}>

        {/* Step 1 */}
        {step === 1 && (
          <div style={card}>
            <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, marginBottom: 6, color: "#fff" }}>Building Information</h2>
            <p style={{ color: "#4a7a62", fontSize: 13, marginBottom: 32 }}>Tell us about your property so we can benchmark accurately.</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, marginBottom: 24 }}>
              <div>
                <label style={label}>Country</label>
                <select style={selectStyle} value={form.country} onChange={e => inp("country", e.target.value)}>
                  {Object.keys(EMISSION_FACTORS).sort().map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <label style={label}>Building Type</label>
                <select style={selectStyle} value={form.buildingType} onChange={e => inp("buildingType", e.target.value)}>
                  {Object.keys(EU_BENCHMARKS).map(t => <option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <div style={{ marginBottom: 32 }}>
              <label style={label}>Total Floor Area (m²)</label>
              <input style={inputStyle} type="number" placeholder="e.g. 2500" value={form.area} onChange={e => inp("area", e.target.value)} />
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button style={{ ...btn, opacity: form.area ? 1 : 0.5 }} onClick={() => form.area && goStep(2)}>Next →</button>
            </div>
          </div>
        )}

        {/* Step 2 */}
        {step === 2 && (
          <div style={card}>
            <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, marginBottom: 6, color: "#fff" }}>Annual Energy Consumption</h2>
            <p style={{ color: "#4a7a62", fontSize: 13, marginBottom: 12 }}>Enter annual kWh for each energy source. Leave blank if not applicable.</p>
            <div style={{ background: "#071510", border: "1px solid #1a3d30", borderRadius: 8, padding: "10px 16px", marginBottom: 28, fontSize: 12, color: "#4ade80" }}>
              📍 Grid emission factor for <strong>{form.country}</strong>: <strong>{EMISSION_FACTORS[form.country]} kg CO₂/kWh</strong>
            </div>
            {[
              { key: "gasKwh", label: "Natural Gas (Scope 1)", placeholder: "e.g. 45000", factor: "0.202 kg CO₂/kWh" },
              { key: "elecKwh", label: "Electricity (Scope 2)", placeholder: "e.g. 120000", factor: `${EMISSION_FACTORS[form.country]} kg CO₂/kWh` },
              { key: "districtKwh", label: "District Heating (Scope 2)", placeholder: "e.g. 30000", factor: "0.17 kg CO₂/kWh" },
            ].map(f => (
              <div key={f.key} style={{ marginBottom: 20 }}>
                <label style={label}>{f.label}</label>
                <div style={{ position: "relative" }}>
                  <input style={inputStyle} type="number" placeholder={f.placeholder} value={form[f.key]} onChange={e => inp(f.key, e.target.value)} />
                  <span style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "#2d5a45", pointerEvents: "none" }}>{f.factor}</span>
                </div>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32 }}>
              <button style={btnOut} onClick={() => goStep(1)}>← Back</button>
              <button style={btn} onClick={() => goStep(3)}>Next →</button>
            </div>
          </div>
        )}

        {/* Step 3 */}
        {step === 3 && (
          <div style={card}>
            <h2 style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, marginBottom: 6, color: "#fff" }}>CSRD Readiness Check</h2>
            <p style={{ color: "#4a7a62", fontSize: 13, marginBottom: 28 }}>Which sustainability practices does your organisation currently have in place?</p>
            {CSRD_CHECKS.map(c => (
              <div key={c.id} onClick={() => setCsrd(p => ({ ...p, [c.id]: !p[c.id] }))}
                style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px", borderRadius: 10, marginBottom: 10, cursor: "pointer", background: csrd[c.id] ? "#0a2218" : "#071510", border: `1px solid ${csrd[c.id] ? "#22c55e" : "#1a3d30"}`, transition: "all 0.2s" }}>
                <div style={{ width: 22, height: 22, borderRadius: 6, background: csrd[c.id] ? "#22c55e" : "transparent", border: `2px solid ${csrd[c.id] ? "#22c55e" : "#1a3d30"}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#071510", flexShrink: 0, transition: "all 0.2s" }}>
                  {csrd[c.id] ? "✓" : ""}
                </div>
                <span style={{ fontSize: 13, flex: 1 }}>{c.label}</span>
                <span style={{ fontSize: 11, color: "#4a7a62" }}>+{c.weight}pts</span>
              </div>
            ))}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32 }}>
              <button style={btnOut} onClick={() => goStep(2)}>← Back</button>
              <button style={btn} onClick={calculate}>Calculate Emissions →</button>
            </div>
          </div>
        )}

        {/* Step 4 — Results */}
        {step === 4 && results && (
          <div>
            {/* KPI Cards */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16, marginBottom: 20 }}>
              {[
                { label: "Total Emissions", value: results.total.toFixed(0), unit: "kg CO₂e/yr", color: "#f59e0b" },
                { label: "Emission Intensity", value: results.intensity.toFixed(1), unit: "kg CO₂/m²/yr", color: results.rating.color },
                { label: "CSRD Score", value: results.csrdScore, unit: "/ 100 pts", color: results.csrdScore >= 70 ? "#22c55e" : results.csrdScore >= 40 ? "#f59e0b" : "#ef4444" },
              ].map(m => (
                <div key={m.label} style={{ ...card, padding: 24, textAlign: "center" }}>
                  <div style={{ fontSize: 10, color: "#4a7a62", letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 10 }}>{m.label}</div>
                  <div style={{ fontSize: 30, fontWeight: 700, fontFamily: "'Syne', sans-serif", color: m.color }}>{Number(m.value).toLocaleString()}</div>
                  <div style={{ fontSize: 11, color: "#4a7a62", marginTop: 4 }}>{m.unit}</div>
                </div>
              ))}
            </div>

            {/* Benchmark */}
            <div style={{ ...card, marginBottom: 20 }}>
              <h3 style={{ fontFamily: "'Syne', sans-serif", marginBottom: 20, color: "#fff" }}>EU Benchmark — {form.buildingType} Buildings</h3>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
                <span style={{ fontSize: 11, color: "#4a7a62", width: 80, flexShrink: 0 }}>Your building</span>
                <div style={{ flex: 1, background: "#071510", borderRadius: 99, height: 12, overflow: "hidden", border: "1px solid #1a3d30" }}>
                  <div style={{ width: `${Math.min(100, (results.intensity / (results.benchmark.poor * 1.3)) * 100)}%`, height: "100%", background: results.rating.color, borderRadius: 99, transition: "width 1s ease" }} />
                </div>
                <span style={{ fontSize: 14, fontWeight: 700, color: results.rating.color, width: 90, textAlign: "right" }}>{results.intensity.toFixed(1)} kg/m²</span>
              </div>
              {[
                { label: "Best-in-class", value: results.benchmark.good, color: "#22c55e" },
                { label: "EU Average", value: results.benchmark.avg, color: "#4ade80" },
                { label: "Poor performers", value: results.benchmark.poor, color: "#ef4444" },
              ].map(b => (
                <div key={b.label} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                  <span style={{ fontSize: 11, color: "#4a7a62", width: 100, flexShrink: 0 }}>{b.label}</span>
                  <div style={{ flex: 1, background: "#071510", borderRadius: 99, height: 6, overflow: "hidden", border: "1px solid #1a3d30" }}>
                    <div style={{ width: `${Math.min(100, (b.value / (results.benchmark.poor * 1.3)) * 100)}%`, height: "100%", background: b.color, opacity: 0.4, borderRadius: 99 }} />
                  </div>
                  <span style={{ fontSize: 12, color: b.color, width: 90, textAlign: "right" }}>{b.value} kg/m²</span>
                </div>
              ))}
              <div style={{ marginTop: 20, padding: "14px 18px", borderRadius: 10, background: "#071510", border: `1px solid ${results.rating.color}`, display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 10, height: 10, borderRadius: "50%", background: results.rating.color, flexShrink: 0 }} />
                <span style={{ fontSize: 13 }}>Your building rates <strong style={{ color: results.rating.color }}>{results.rating.label}</strong> compared to EU peers in the {form.buildingType.toLowerCase()} sector.</span>
              </div>
            </div>

            {/* Scope Breakdown */}
            <div style={{ ...card, marginBottom: 20 }}>
              <h3 style={{ fontFamily: "'Syne', sans-serif", marginBottom: 20, color: "#fff" }}>Scope Breakdown</h3>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                {[
                  { label: "Scope 1 — Direct (Gas)", value: results.scope1, note: "Natural gas combustion on-site" },
                  { label: "Scope 2 — Indirect (Grid)", value: results.scope2, note: "Purchased electricity & district heat" },
                ].map(sc => (
                  <div key={sc.label} style={{ background: "#071510", borderRadius: 10, padding: 20, border: "1px solid #1a3d30" }}>
                    <div style={{ fontSize: 11, color: "#4a7a62", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>{sc.label}</div>
                    <div style={{ fontSize: 26, fontWeight: 700, fontFamily: "'Syne', sans-serif", color: "#fff" }}>{sc.value.toFixed(0).toLocaleString()}</div>
                    <div style={{ fontSize: 11, color: "#4a7a62", marginTop: 4 }}>kg CO₂e/yr</div>
                    <div style={{ marginTop: 12, height: 4, borderRadius: 99, background: "#1a3d30" }}>
                      <div style={{ width: `${results.total > 0 ? (sc.value / results.total) * 100 : 0}%`, height: "100%", background: "#22c55e", borderRadius: 99 }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#4ade80", marginTop: 6 }}>{results.total > 0 ? ((sc.value / results.total) * 100).toFixed(0) : 0}% of total</div>
                    <div style={{ fontSize: 11, color: "#2d5a45", marginTop: 4 }}>{sc.note}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Decarbonisation Chart */}
            <div style={{ ...card, marginBottom: 20 }}>
              <h3 style={{ fontFamily: "'Syne', sans-serif", marginBottom: 4, color: "#fff" }}>Decarbonisation Pathway to Net Zero 2050</h3>
              <p style={{ color: "#4a7a62", fontSize: 12, marginBottom: 24 }}>Projected trajectory from current intensity to net zero using an accelerated reduction curve.</p>
              <ResponsiveContainer width="100%" height={220}>
                <AreaChart data={results.path} margin={{ top: 5, right: 20, left: 0, bottom: 5 }}>
                  <defs>
                    <linearGradient id="emGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#22c55e" stopOpacity={0.2} />
                      <stop offset="95%" stopColor="#22c55e" stopOpacity={0} />
                    </linearGradient>
                  </defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#1a3d30" />
                  <XAxis dataKey="year" tick={{ fill: "#4a7a62", fontSize: 11 }} tickLine={false} interval={4} />
                  <YAxis tick={{ fill: "#4a7a62", fontSize: 11 }} tickLine={false} axisLine={false} unit=" kg" />
                  <Tooltip content={<CustomTooltip />} />
                  <ReferenceLine y={0} stroke="#22c55e" strokeDasharray="4 4" />
                  <Area type="monotone" dataKey="emissions" stroke="#22c55e" strokeWidth={2.5} fill="url(#emGrad)" name="Your trajectory" dot={false} />
                  <Line type="monotone" dataKey="target" stroke="#4a7a62" strokeWidth={1.5} strokeDasharray="5 5" name="Linear target" dot={false} />
                </AreaChart>
              </ResponsiveContainer>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginTop: 16 }}>
                {[{ year: 2030, r: "43%" }, { year: 2040, r: "72%" }, { year: 2050, r: "100%" }].map(m => (
                  <div key={m.year} style={{ background: "#071510", borderRadius: 8, padding: "12px 16px", border: "1px solid #1a3d30", textAlign: "center" }}>
                    <div style={{ fontSize: 11, color: "#4a7a62", marginBottom: 4 }}>{m.year} Target</div>
                    <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Syne', sans-serif", color: "#22c55e" }}>{m.r}</div>
                    <div style={{ fontSize: 10, color: "#2d5a45" }}>reduction</div>
                  </div>
                ))}
              </div>
            </div>

            {/* CSRD Score */}
            <div style={{ ...card, marginBottom: 20 }}>
              <h3 style={{ fontFamily: "'Syne', sans-serif", marginBottom: 20, color: "#fff" }}>CSRD Readiness Score</h3>
              <div style={{ display: "flex", alignItems: "center", gap: 24, marginBottom: 24 }}>
                <div style={{ width: 90, height: 90, borderRadius: "50%", background: `conic-gradient(${results.csrdScore >= 70 ? "#22c55e" : results.csrdScore >= 40 ? "#f59e0b" : "#ef4444"} ${results.csrdScore * 3.6}deg, #071510 0deg)`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <div style={{ width: 68, height: 68, borderRadius: "50%", background: "#0d1f18", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Syne', sans-serif", color: results.csrdScore >= 70 ? "#22c55e" : results.csrdScore >= 40 ? "#f59e0b" : "#ef4444" }}>{results.csrdScore}</span>
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#fff", marginBottom: 6 }}>
                    {results.csrdScore >= 70 ? "CSRD Ready ✅" : results.csrdScore >= 40 ? "Partially Ready ⚠️" : "Action Required ❌"}
                  </div>
                  <div style={{ fontSize: 13, color: "#4a7a62", lineHeight: 1.6 }}>
                    {results.csrdScore >= 70 ? "Your organisation demonstrates strong sustainability governance." : results.csrdScore >= 40 ? "Several practices are in place, but gaps remain before full CSRD compliance." : "Significant groundwork is needed to meet CSRD reporting requirements."}
                  </div>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {CSRD_CHECKS.map(c => (
                  <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8, background: "#071510", border: `1px solid ${csrd[c.id] ? "#22c55e33" : "#1a3d30"}` }}>
                    <span style={{ fontSize: 14 }}>{csrd[c.id] ? "✅" : "⬜"}</span>
                    <span style={{ fontSize: 12, color: csrd[c.id] ? "#e2f5ec" : "#4a7a62" }}>{c.label}</span>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "center", paddingBottom: 40 }}>
              <button style={btnOut} onClick={() => { setStep(1); setForm({ country: "Denmark", buildingType: "Office", area: "", gasKwh: "", elecKwh: "", districtKwh: "" }); setCsrd({}); setResults(null); goStep(1); }}>
                ↩ Start New Assessment
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
