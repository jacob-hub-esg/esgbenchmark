<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Building Emissions Benchmark & Decarbonisation Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#071510;font-family:'DM Mono',monospace;color:#e2f5ec;min-height:100vh;}
select,input{appearance:none;-webkit-appearance:none;outline:none;}
select option{background:#071510;}
input::placeholder{color:#2d5a45;}
select:focus,input:focus{border-color:#22c55e!important;}
.fade{animation:fadeUp 0.4s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card{background:#0d1f18;border:1px solid #1a3d30;border-radius:16px;padding:28px;}
.lbl{font-size:11px;color:#4ade80;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:block;}
.inp{width:100%;background:#071510;border:1px solid #1a3d30;border-radius:8px;color:#e2f5ec;padding:12px 14px;font-size:14px;font-family:'DM Mono',monospace;transition:border-color 0.2s;}
.sel{width:100%;background:#071510;border:1px solid #1a3d30;border-radius:8px;color:#e2f5ec;padding:12px 14px;font-size:14px;font-family:'DM Mono',monospace;cursor:pointer;transition:border-color 0.2s;}
.btn-primary{background:linear-gradient(135deg,#22c55e,#16a34a);color:#071510;border:none;border-radius:10px;padding:13px 30px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Mono',monospace;}
.btn-secondary{background:transparent;color:#4ade80;border:1px solid #1a3d30;border-radius:10px;padding:11px 22px;font-size:13px;cursor:pointer;font-family:'DM Mono',monospace;}
.btn-primary:hover{opacity:0.9;}
.btn-secondary:hover{border-color:#22c55e;}
.step-wrap{max-width:760px;margin:0 auto;padding:0 24px 60px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.tag{font-family:'Syne',sans-serif;}
</style>
</head>
<body>

<!-- HEADER -->
<div style="background:linear-gradient(135deg,#0a2218,#071510);border-bottom:1px solid #1a3d30;padding:22px 36px;display:flex;align-items:center;gap:14px;">
  <div style="width:36px;height:36px;background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🌿</div>
  <div>
    <div class="tag" style="font-size:20px;color:#fff;letter-spacing:-0.5px;">BuildingCarbon.io</div>
    <div style="font-size:11px;color:#4ade80;letter-spacing:2px;text-transform:uppercase;margin-top:2px;">Emissions Benchmark & Decarbonisation Tool</div>
  </div>
  <div style="margin-left:auto;font-size:10px;color:#2d5a45;letter-spacing:1px;">POWERED BY GHG PROTOCOL</div>
</div>

<!-- STEPS NAV -->
<div id="stepsNav" style="max-width:760px;margin:0 auto;padding:22px 24px;display:flex;align-items:center;gap:8px;"></div>

<!-- CONTENT -->
<div class="step-wrap">
  <div id="app"></div>
</div>

<script>
const EF = {Denmark:0.154,Sweden:0.045,Norway:0.026,Finland:0.098,Germany:0.385,Netherlands:0.283,France:0.052,Italy:0.233,Spain:0.181,Poland:0.635,"United Kingdom":0.225,Belgium:0.167,Lithuania:0.216,Latvia:0.119,Estonia:0.471,"Czech Republic":0.421,Austria:0.104,Switzerland:0.030,Portugal:0.196,Greece:0.328};
const BENCH = {Office:{avg:45,good:28,poor:70},Residential:{avg:35,good:20,poor:55},Retail:{avg:55,good:35,poor:85},Industrial:{avg:80,good:50,poor:120},Hotel:{avg:65,good:40,poor:100},Healthcare:{avg:90,good:60,poor:130}};
const CSRD = [{id:"scope1",label:"Scope 1 emissions tracked",w:20},{id:"scope2",label:"Scope 2 emissions tracked",w:20},{id:"scope3",label:"Scope 3 partial coverage",w:15},{id:"energyAudit",label:"Energy audit conducted",w:15},{id:"sbti",label:"SBTi target set",w:15},{id:"thirdParty",label:"Third-party verified data",w:15}];

let state = {step:1,country:"Denmark",buildingType:"Office",area:"",gas:"",elec:"",district:"",csrd:{},results:null};

function rating(v,b){
  if(v<=b.good)return{label:"Excellent",color:"#22c55e"};
  if(v<=b.avg)return{label:"Good",color:"#84cc16"};
  if(v<=b.poor)return{label:"Average",color:"#f59e0b"};
  return{label:"Poor",color:"#ef4444"};
}

function renderSteps(){
  const labels=["Building Info","Energy Data","CSRD Check","Results"];
  const nav=document.getElementById("stepsNav");
  nav.innerHTML=labels.map((l,i)=>{
    const n=i+1;
    const active=state.step===n;
    const done=state.step>n;
    const bg=done?"#22c55e":active?"#071510":"#0d1f18";
    const border=done||active?"2px solid #22c55e":"1px solid #1a3d30";
    const col=done?"#071510":active?"#22c55e":"#4a7a62";
    const lc=active?"#4ade80":"#2d5a45";
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
      <div style="width:28px;height:28px;border-radius:50%;background:${bg};border:${border};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${col};">${done?"✓":n}</div>
      <span style="font-size:10px;color:${lc};letter-spacing:1px;white-space:nowrap;">${l.toUpperCase()}</span>
    </div>${i<3?'<div style="flex:1;height:1px;background:#1a3d30;margin-bottom:14px;"></div>':''}`
  }).join("");
}

function go(s){
  const app=document.getElementById("app");
  app.style.opacity=0;
  setTimeout(()=>{
    state.step=s;
    renderSteps();
    render();
    app.className="fade";
    app.style.opacity=1;
  },120);
}

function calculate(){
  const area=parseFloat(state.area)||1;
  const gas=parseFloat(state.gas)||0;
  const elec=parseFloat(state.elec)||0;
  const dist=parseFloat(state.district)||0;
  const ef=EF[state.country];
  const s1=gas*0.202;
  const s2=elec*ef+dist*0.17;
  const total=s1+s2;
  const intensity=total/area;
  const b=BENCH[state.buildingType];
  const r=rating(intensity,b);
  const csrdScore=CSRD.reduce((a,c)=>a+(state.csrd[c.id]?c.w:0),0);
  state.results={s1,s2,total,intensity,b,r,csrdScore};
  go(4);
}

function buildChart(intensity){
  const pts=[];
  for(let y=2025;y<=2050;y++){
    const p=(y-2025)/25;
    const e=1-Math.pow(1-p,2);
    pts.push({y,v:parseFloat((intensity*(1-e)).toFixed(2)),t:parseFloat((intensity*(1-p)).toFixed(2))});
  }
  const W=680,H=180,PL=50,PR=20,PT=10,PB=30;
  const cW=W-PL-PR,cH=H-PT-PB;
  const maxV=intensity*1.05;
  const xS=i=>PL+i*(cW/(pts.length-1));
  const yS=v=>PT+cH-(v/maxV)*cH;

  const areaPath=pts.map((p,i)=>`${i===0?"M":"L"}${xS(i)},${yS(p.v)}`).join(" ")+` L${xS(pts.length-1)},${PT+cH} L${xS(0)},${PT+cH} Z`;
  const linePath=pts.map((p,i)=>`${i===0?"M":"L"}${xS(i)},${yS(p.v)}`).join(" ");
  const targetPath=pts.map((p,i)=>`${i===0?"M":"L"}${xS(i)},${yS(p.t)}`).join(" ");

  const years=[2025,2030,2035,2040,2045,2050];
  const xLabels=years.map(yr=>{
    const idx=pts.findIndex(p=>p.y===yr);
    return`<text x="${xS(idx)}" y="${H-6}" fill="#4a7a62" font-size="11" text-anchor="middle" font-family="DM Mono,monospace">${yr}</text>`;
  }).join("");

  const ySteps=4;
  const yLabels=Array.from({length:ySteps+1},(_,i)=>{
    const v=parseFloat((maxV*(1-i/ySteps)).toFixed(1));
    const y2=PT+(i/ySteps)*cH;
    return`<text x="${PL-8}" y="${y2+4}" fill="#4a7a62" font-size="10" text-anchor="end" font-family="DM Mono,monospace">${v}</text>
    <line x1="${PL}" y1="${y2}" x2="${W-PR}" y2="${y2}" stroke="#1a3d30" stroke-dasharray="3,3"/>`;
  }).join("");

  return`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible;">
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${yLabels}
    ${xLabels}
    <path d="${areaPath}" fill="url(#g1)"/>
    <path d="${linePath}" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="${targetPath}" fill="none" stroke="#4a7a62" stroke-width="1.5" stroke-dasharray="5,5"/>
    <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="#1a3d30"/>
    <text x="${W-PR}" y="${yS(0)-6}" fill="#22c55e" font-size="10" text-anchor="end" font-family="DM Mono,monospace">Net Zero</text>
  </svg>`;
}

function render(){
  const app=document.getElementById("app");
  const s=state;

  if(s.step===1){
    app.innerHTML=`<div class="card">
      <h2 class="tag" style="font-size:24px;color:#fff;margin-bottom:6px;">Building Information</h2>
      <p style="color:#4a7a62;font-size:13px;margin-bottom:28px;">Tell us about your property so we can benchmark accurately.</p>
      <div class="grid2" style="margin-bottom:22px;">
        <div>
          <label class="lbl">Country</label>
          <select class="sel" id="country">${Object.keys(EF).sort().map(c=>`<option ${c===s.country?"selected":""}>${c}</option>`).join("")}</select>
        </div>
        <div>
          <label class="lbl">Building Type</label>
          <select class="sel" id="btype">${Object.keys(BENCH).map(t=>`<option ${t===s.buildingType?"selected":""}>${t}</option>`).join("")}</select>
        </div>
      </div>
      <div style="margin-bottom:28px;">
        <label class="lbl">Total Floor Area (m²)</label>
        <input class="inp" type="number" id="area" placeholder="e.g. 2500" value="${s.area}"/>
      </div>
      <div style="display:flex;justify-content:flex-end;">
        <button class="btn-primary" onclick="
          state.country=document.getElementById('country').value;
          state.buildingType=document.getElementById('btype').value;
          state.area=document.getElementById('area').value;
          if(state.area) go(2);
        ">Next →</button>
      </div>
    </div>`;
  }

  else if(s.step===2){
    app.innerHTML=`<div class="card">
      <h2 class="tag" style="font-size:24px;color:#fff;margin-bottom:6px;">Annual Energy Consumption</h2>
      <p style="color:#4a7a62;font-size:13px;margin-bottom:12px;">Enter annual kWh for each energy source. Leave blank if not applicable.</p>
      <div style="background:#071510;border:1px solid #1a3d30;border-radius:8px;padding:10px 16px;margin-bottom:24px;font-size:12px;color:#4ade80;">
        📍 Grid emission factor for <strong>${s.country}</strong>: <strong>${EF[s.country]} kg CO₂/kWh</strong>
      </div>
      ${[
        {id:"gas",label:"Natural Gas (Scope 1)",ph:"e.g. 45000",fac:"0.202 kg CO₂/kWh",val:s.gas},
        {id:"elec",label:"Electricity (Scope 2)",ph:"e.g. 120000",fac:`${EF[s.country]} kg CO₂/kWh`,val:s.elec},
        {id:"dist",label:"District Heating (Scope 2)",ph:"e.g. 30000",fac:"0.17 kg CO₂/kWh",val:s.district},
      ].map(f=>`<div style="margin-bottom:18px;">
        <label class="lbl">${f.label}</label>
        <div style="position:relative;">
          <input class="inp" type="number" id="${f.id}" placeholder="${f.ph}" value="${f.val}" style="padding-right:160px;"/>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:11px;color:#2d5a45;pointer-events:none;">${f.fac}</span>
        </div>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;margin-top:28px;">
        <button class="btn-secondary" onclick="go(1)">← Back</button>
        <button class="btn-primary" onclick="
          state.gas=document.getElementById('gas').value;
          state.elec=document.getElementById('elec').value;
          state.district=document.getElementById('dist').value;
          go(3);
        ">Next →</button>
      </div>
    </div>`;
  }

  else if(s.step===3){
    app.innerHTML=`<div class="card">
      <h2 class="tag" style="font-size:24px;color:#fff;margin-bottom:6px;">CSRD Readiness Check</h2>
      <p style="color:#4a7a62;font-size:13px;margin-bottom:24px;">Which sustainability practices does your organisation currently have in place?</p>
      ${CSRD.map(c=>`
        <div onclick="state.csrd['${c.id}']=!state.csrd['${c.id}'];render();" style="display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:10px;margin-bottom:9px;cursor:pointer;background:${s.csrd[c.id]?"#0a2218":"#071510"};border:1px solid ${s.csrd[c.id]?"#22c55e":"#1a3d30"};transition:all 0.2s;">
          <div style="width:22px;height:22px;border-radius:6px;background:${s.csrd[c.id]?"#22c55e":"transparent"};border:2px solid ${s.csrd[c.id]?"#22c55e":"#1a3d30"};display:flex;align-items:center;justify-content:center;font-size:13px;color:#071510;flex-shrink:0;">
            ${s.csrd[c.id]?"✓":""}
          </div>
          <span style="font-size:13px;flex:1;">${c.label}</span>
          <span style="font-size:11px;color:#4a7a62;">+${c.w}pts</span>
        </div>`).join("")}
      <div style="display:flex;justify-content:space-between;margin-top:28px;">
        <button class="btn-secondary" onclick="go(2)">← Back</button>
        <button class="btn-primary" onclick="calculate()">Calculate Emissions →</button>
      </div>
    </div>`;
  }

  else if(s.step===4&&s.results){
    const r=s.results;
    const maxBar=r.b.poor*1.3;
    const csrdColor=r.csrdScore>=70?"#22c55e":r.csrdScore>=40?"#f59e0b":"#ef4444";
    const csrdLabel=r.csrdScore>=70?"CSRD Ready ✅":r.csrdScore>=40?"Partially Ready ⚠️":"Action Required ❌";
    const csrdMsg=r.csrdScore>=70?"Your organisation demonstrates strong sustainability governance.":r.csrdScore>=40?"Several practices are in place, but gaps remain before full CSRD compliance.":"Significant groundwork is needed to meet CSRD reporting requirements.";
    const deg=r.csrdScore*3.6;

    app.innerHTML=`
    <!-- KPI Cards -->
    <div class="grid3" style="margin-bottom:18px;">
      ${[
        {label:"Total Emissions",val:Math.round(r.total).toLocaleString(),unit:"kg CO₂e / yr",col:"#f59e0b"},
        {label:"Emission Intensity",val:r.intensity.toFixed(1),unit:"kg CO₂ / m² / yr",col:r.r.color},
        {label:"CSRD Score",val:r.csrdScore,unit:"out of 100 pts",col:csrdColor},
      ].map(m=>`<div class="card" style="padding:22px;text-align:center;">
        <div style="font-size:10px;color:#4a7a62;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;">${m.label}</div>
        <div class="tag" style="font-size:30px;color:${m.col};">${m.val}</div>
        <div style="font-size:11px;color:#4a7a62;margin-top:4px;">${m.unit}</div>
      </div>`).join("")}
    </div>

    <!-- Benchmark -->
    <div class="card" style="margin-bottom:18px;">
      <h3 class="tag" style="color:#fff;margin-bottom:18px;">EU Benchmark — ${s.buildingType} Buildings</h3>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <span style="font-size:11px;color:#4a7a62;width:90px;flex-shrink:0;">Your building</span>
        <div style="flex:1;background:#071510;border-radius:99px;height:12px;overflow:hidden;border:1px solid #1a3d30;">
          <div style="width:${Math.min(100,(r.intensity/maxBar)*100)}%;height:100%;background:${r.r.color};border-radius:99px;"></div>
        </div>
        <span style="font-size:14px;font-weight:700;color:${r.r.color};width:100px;text-align:right;">${r.intensity.toFixed(1)} kg/m²</span>
      </div>
      ${[
        {label:"Best-in-class",val:r.b.good,col:"#22c55e"},
        {label:"EU Average",val:r.b.avg,col:"#4ade80"},
        {label:"Poor performers",val:r.b.poor,col:"#ef4444"},
      ].map(b=>`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <span style="font-size:11px;color:#4a7a62;width:110px;flex-shrink:0;">${b.label}</span>
        <div style="flex:1;background:#071510;border-radius:99px;height:6px;overflow:hidden;border:1px solid #1a3d30;">
          <div style="width:${Math.min(100,(b.val/maxBar)*100)}%;height:100%;background:${b.col};opacity:0.4;border-radius:99px;"></div>
        </div>
        <span style="font-size:12px;color:${b.col};width:100px;text-align:right;">${b.val} kg/m²</span>
      </div>`).join("")}
      <div style="margin-top:18px;padding:13px 16px;border-radius:10px;background:#071510;border:1px solid ${r.r.color};display:flex;align-items:center;gap:12px;">
        <div style="width:10px;height:10px;border-radius:50%;background:${r.r.color};flex-shrink:0;"></div>
        <span style="font-size:13px;">Your building rates <strong style="color:${r.r.color};">${r.r.label}</strong> compared to EU peers in the ${s.buildingType.toLowerCase()} sector.</span>
      </div>
    </div>

    <!-- Scope Breakdown -->
    <div class="card" style="margin-bottom:18px;">
      <h3 class="tag" style="color:#fff;margin-bottom:18px;">Scope Breakdown</h3>
      <div class="grid2">
        ${[
          {label:"Scope 1 — Direct (Gas)",val:r.s1,note:"Natural gas combustion on-site"},
          {label:"Scope 2 — Indirect (Grid)",val:r.s2,note:"Purchased electricity & district heat"},
        ].map(sc=>{
          const pct=r.total>0?((sc.val/r.total)*100).toFixed(0):0;
          return`<div style="background:#071510;border-radius:10px;padding:20px;border:1px solid #1a3d30;">
            <div style="font-size:11px;color:#4a7a62;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;">${sc.label}</div>
            <div class="tag" style="font-size:26px;color:#fff;">${Math.round(sc.val).toLocaleString()}</div>
            <div style="font-size:11px;color:#4a7a62;margin-top:4px;">kg CO₂e / yr</div>
            <div style="margin-top:12px;height:4px;border-radius:99px;background:#1a3d30;">
              <div style="width:${pct}%;height:100%;background:#22c55e;border-radius:99px;"></div>
            </div>
            <div style="font-size:11px;color:#4ade80;margin-top:6px;">${pct}% of total</div>
            <div style="font-size:11px;color:#2d5a45;margin-top:4px;">${sc.note}</div>
          </div>`;
        }).join("")}
      </div>
    </div>

    <!-- Decarbonisation Chart -->
    <div class="card" style="margin-bottom:18px;">
      <h3 class="tag" style="color:#fff;margin-bottom:4px;">Decarbonisation Pathway to Net Zero 2050</h3>
      <p style="color:#4a7a62;font-size:12px;margin-bottom:20px;">Projected trajectory from current intensity using an accelerated reduction curve.</p>
      ${buildChart(r.intensity)}
      <div style="display:flex;gap:20px;margin-top:12px;">
        <span style="font-size:11px;color:#22c55e;">— Your trajectory</span>
        <span style="font-size:11px;color:#4a7a62;">- - Linear target</span>
      </div>
      <div class="grid3" style="margin-top:16px;">
        ${[{yr:2030,red:"43%"},{yr:2040,red:"72%"},{yr:2050,red:"100%"}].map(m=>`
        <div style="background:#071510;border-radius:8px;padding:12px 16px;border:1px solid #1a3d30;text-align:center;">
          <div style="font-size:11px;color:#4a7a62;margin-bottom:4px;">${m.yr} Target</div>
          <div class="tag" style="font-size:20px;color:#22c55e;">${m.red}</div>
          <div style="font-size:10px;color:#2d5a45;">reduction</div>
        </div>`).join("")}
      </div>
    </div>

    <!-- CSRD -->
    <div class="card" style="margin-bottom:24px;">
      <h3 class="tag" style="color:#fff;margin-bottom:18px;">CSRD Readiness Score</h3>
      <div style="display:flex;align-items:center;gap:22px;margin-bottom:22px;">
        <div style="width:88px;height:88px;border-radius:50%;background:conic-gradient(${csrdColor} ${deg}deg,#1a3d30 ${deg}deg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <div style="width:66px;height:66px;border-radius:50%;background:#0d1f18;display:flex;align-items:center;justify-content:center;">
            <span class="tag" style="font-size:22px;color:${csrdColor};">${r.csrdScore}</span>
          </div>
        </div>
        <div>
          <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;">${csrdLabel}</div>
          <div style="font-size:13px;color:#4a7a62;line-height:1.6;">${csrdMsg}</div>
        </div>
      </div>
      <div class="grid2">
        ${CSRD.map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:#071510;border:1px solid ${s.csrd[c.id]?"#22c55e33":"#1a3d30"};">
          <span style="font-size:14px;">${s.csrd[c.id]?"✅":"⬜"}</span>
          <span style="font-size:12px;color:${s.csrd[c.id]?"#e2f5ec":"#4a7a62"};">${c.label}</span>
        </div>`).join("")}
      </div>
    </div>

    <div style="display:flex;justify-content:center;">
      <button class="btn-secondary" onclick="state={step:1,country:'Denmark',buildingType:'Office',area:'',gas:'',elec:'',district:'',csrd:{},results:null};go(1);">↩ Start New Assessment</button>
    </div>`;
  }
}

renderSteps();
render();
</script>
</body>
</html>
